<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title></title>
	<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
	<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

</head>
<body style="margin: 0px; overflow: hidden;">
	<a-scene debug embedded arjs='trackingMethod: best; debugUIEnabled: false;'>
		<a-marker-camera preset='custom' type='pattern' url='./pattern-test.patt'>
			<a-box id="myBox" rotation="0 0 0" position="0 0.5 0" depth="1" height="1" width="1" material='opacity: 0.5; side:double; color:blue;'>
			<a-animation attribute="rotation" dur="10000" to="0 360 0" repeat="indefinite"></a-animation>
			</a-box>
			<a-image src="./thank.jpg" rotation="90 180 0" position="0 1.1 0"></a-image>
			<a-image src="./text-example.png" rotation="90 180 180" position="0 1.2 0" scale="1 -1 1" 
				 animation="property: rotation; to: 90 540 180; loop: true; dur: 25000">
			</a-image>
		</a-marker-camera>
		<a-camera-static/>
	</a-scene>
</body>
</html>
